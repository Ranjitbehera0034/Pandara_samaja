name: Deploy to GitHub Pages

on:
  push:
    branches:
      - develop # Only deploy on push to develop branch (match your main branch if needed)
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Build applications
        run: npm run build

      - name: Clean up for deployment (remove source and unnecessary folders)
        run: |
          rm .gitignore
          rm -rf node_modules admin-app portal-app android www .git .github
          # Keep only: admin/, portal/, assets/, index.html, members.html, about.html, blogs.html, CNAME, package.json (optional)

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Deploy the entire root directory (which now contains built admin/ and portal/)
          path: "."

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
