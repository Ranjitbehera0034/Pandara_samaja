name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies (Monorepo)
        run: npm install --legacy-peer-deps

      - name: Run Validation (Lint & Typecheck)
        run: |
          npm run lint
          npm run typecheck

      - name: Build All Applications
        run: |
          npm run build --workspaces

      - name: Prepare deployment directory
        run: |
          mkdir -p _site

          # Copy static HTML pages
          cp -f index.html about.html blogs.html matrimony.html members.html _site/ 2>/dev/null || true

          # Copy CNAME for custom domain
          cp -f CNAME _site/ 2>/dev/null || true

          # Copy static assets (CSS, JS, images)
          cp -r assets _site/ 2>/dev/null || true

          # Copy built React apps
          # vite.config.ts sets outDir: '../admin' and '../portal' (relative to repo root)
          cp -r admin _site/admin
          cp -r portal _site/portal

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "_site"

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4